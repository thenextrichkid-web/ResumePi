<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Deck | ResumePi_lot™</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --core: #00f2ff; --brand: #FF4D00; --bg: #000205; --dark-blue: #0a1321; --fail: #ff0055; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .hero-bg { position: fixed; inset: 0; background: radial-gradient(circle at center, var(--dark-blue) 0%, #000 100%); z-index: -1; }
        
        /* HEADER & LOGO */
        .top-nav { display: flex; justify-content: space-between; padding: 15px 25px; align-items: center; border-bottom: 1px solid rgba(0,242,255,0.1); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; }
        .logo-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .wings-logo { position: relative; width: 35px; height: 25px; display: flex; align-items: center; justify-content: center; }
        .wing { position: absolute; width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 22px solid var(--core); filter: drop-shadow(0 0 5px var(--core)); }
        .wing.l { transform: rotate(-45deg) translateX(-6px); opacity: 0.6; }
        .wing.r { transform: rotate(45deg) translateX(6px); }
        .logo-text { font-family: 'Orbitron'; font-weight: 900; font-size: 14px; letter-spacing: 2px; color: white; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; box-sizing: border-box; }
        @media (min-width: 768px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } .full-width { grid-column: 1 / -1; } }

        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,242,255,0.1); border-radius: 20px; padding: 20px; backdrop-filter: blur(15px); }
        .card-header { font-family: 'Orbitron'; font-size: 9px; color: var(--core); letter-spacing: 2px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .terminal-box { background: #000; border: 1px solid #1e293b; border-radius: 12px; padding: 15px; font-family: 'Courier New', monospace; font-size: 13px; color: #10b981; min-height: 100px; line-height: 1.4; overflow-y: auto; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #10b981; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        h2 { font-family: 'Orbitron'; font-size: 18px; margin: 0 0 10px 0; color: white; }
        .data-content { color: #94a3b8; font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
        .btn-prime { background: transparent; border: 1px solid var(--core); color: var(--core); padding: 15px; width: 100%; font-family: 'Orbitron'; font-size: 10px; font-weight: 900; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-top: 15px; letter-spacing: 2px; }
        .btn-prime:hover { background: var(--core); color: black; box-shadow: 0 0 20px var(--core); }
        .btn-alt { border-color: var(--brand); color: var(--brand); }
    </style>
</head>
<body>
    <div class="hero-bg"></div>

    <nav class="top-nav">
        <a href="#" class="logo-wrap">
            <div class="wings-logo"><div class="wing l"></div><div class="wing r"></div></div>
            <div class="logo-text">RESUMEPI_LOT™</div>
        </a>
        <div style="font-family: 'Orbitron'; font-size: 9px; color: var(--core); text-align: right;" id="p-id">CALLSIGN: --</div>
    </nav>

    <main class="dashboard-grid">
        <div class="card">
            <div class="card-header"><span>MOD_01 // VECTOR_LOG</span></div>
            <h2>System Diagnostics</h2>
            <div class="terminal-box">
                <div id="log-text"></div><span class="cursor"></span>
            </div>
            <button class="btn-prime" onclick="location.reload()">REFRESH UPLINK</button>
        </div>

        <div class="card">
            <div class="card-header"><span>MOD_02 // INTEL_GAP</span> <span id="score-tag" style="color:var(--fail)">SCORE: --</span></div>
            <h2>Armor Deficiencies</h2>
            <div class="data-content" id="missing-vectors" style="color:var(--fail)">
                > Analyzing intelligence gaps...
            </div>
            <button class="btn-prime" style="border-color:var(--fail); color:var(--fail)">VECTOR_SHIFT (KEYWORDS)</button>
        </div>

        <div class="card full-width">
            <div class="card-header"><span>MOD_03 // TACTICAL_SUMMARY</span></div>
            <h2>Tactical Professional Dossier</h2>
            <div class="data-content" id="bio-summary">Synchronizing neural reconstruct...</div>
            <div style="display:flex; gap: 15px; flex-wrap: wrap; margin-top: 10px;">
                <button class="btn-prime btn-alt" style="flex:1" onclick="generatePDF()">DOWNLOAD DOSSIER (PDF)</button>
                <button class="btn-prime" style="flex:1" onclick="generateCoverLetter()">GENERATE COVER LETTER</button>
            </div>
        </div>
    </main>

    <script>
        const email = localStorage.getItem('pilot_email');
        const name = localStorage.getItem('pilot_name') || "Pilot";

        // Typing Effect
        const logs = [
            `> UPLINK ESTABLISHED FOR ${name.toUpperCase()}...`,
            "> ANALYZING MISSION OBJECTIVES...",
            "> STATUS: DEPLOYMENT READY."
        ];
        let line = 0;
        function typeLog() {
            if (line < logs.length) {
                document.getElementById('log-text').innerHTML += logs[line] + "<br>";
                line++;
                setTimeout(typeLog, 1000);
            }
        }

        (async function sync() {
            if (!email) { window.location.href = 'onboarding.html'; return; }
            document.getElementById('p-id').innerText = `CALLSIGN: ${name.toUpperCase()}`;
            typeLog();

            try {
                const response = await fetch("https://alliancebusiness.app.n8n.cloud/webhook/verify-pilot", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                const result = await response.json();
                
                // Map Data to UI
                document.getElementById('bio-summary').innerText = result.summary || "Summary synced.";
                document.getElementById('missing-vectors').innerText = result.missing || "Analyzing intelligence gaps...";
                document.getElementById('score-tag').innerText = `SCORE: ${result.score || '--'}`;
                if (result.pilot_name) document.getElementById('p-id').innerText = `CALLSIGN: ${result.pilot_name.toUpperCase()}`;
            } catch (e) { console.error("Sync Failure."); }
        })();

        function generatePDF() { alert("Building $100 Professional Dossier..."); }
        function generateCoverLetter() { alert("Requesting AI Uplink..."); }
    </script>
</body>
</html>
