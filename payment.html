<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repair Protocol | ResumePi_lot™</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --core: #00f2ff; --fail: #ff0055; --bg: #000105; --brand: #FF4D00; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .repair-deck { width: 420px; background: rgba(0, 5, 12, 0.98); border: 2px solid var(--fail); border-radius: 40px; padding: 40px; text-align: center; position: relative; box-shadow: 0 0 50px rgba(255,0,85,0.2); }
        .warning-stripe { background: repeating-linear-gradient(45deg, var(--fail), var(--fail) 10px, #000 10px, #000 20px); height: 10px; position: absolute; top: 0; left: 0; width: 100%; border-radius: 40px 40px 0 0; }
        h1 { font-family: 'Orbitron'; font-size: 18px; color: var(--fail); letter-spacing: 3px; margin-top: 15px; }
        .damage-status { font-family: 'Orbitron'; font-size: 56px; margin: 10px 0; }
        .qr-frame { background: white; width: 220px; height: 220px; margin: 20px auto; padding: 10px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .qr-frame img { width: 100%; height: auto; border-radius: 4px; }
        .price-display { font-family: 'Orbitron'; font-size: 32px; color: var(--core); margin-bottom: 10px; }
        .btn-repair { background: var(--fail); color: white; border: none; padding: 22px; width: 100%; font-family: 'Orbitron'; font-size: 14px; letter-spacing: 2px; cursor: pointer; border-radius: 14px; box-shadow: 0 10px 20px rgba(255,0,85,0.3); }
        #vip-alert { color: var(--core); font-size: 11px; font-family: 'Orbitron'; margin-bottom: 15px; display: none; border: 1px solid var(--core); padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="repair-deck">
        <div class="warning-stripe"></div>
        <h1>REPAIR_PROTOCOL</h1>
        <div class="damage-status">41%</div>
        <p style="color: #94a3b8; font-size: 14px;">Integrity Failure. Manual Fuel Injection Required.</p>
        
        <div id="vip-alert">RESUMEAI_VIP_UPLINK: ACTIVE</div>
        <div class="price-display" id="priceText">₹999</div>

        <div class="qr-frame">
            <img src="your_qr.png" alt="Scan to Pay">
        </div>

        <button class="btn-repair" onclick="openUPI()">AUTHORIZE REPAIR</button>
        <p style="font-size: 11px; opacity: 0.5; margin-top: 20px;">Deep-link will open UPI app on mobile. On desktop, scan QR.</p>
        <a href="dashboard.html" style="color: var(--core); font-family: 'Orbitron'; font-size: 10px; text-decoration: none; margin-top: 20px; display: block; opacity: 0.3;">DEBUG: SKIP TO DASHBOARD</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const amt = urlParams.get('amt') || "999";
        const upiID = "8309167536@seyes"; // Using your ID from the Fed QR

        if (amt === '99') {
            document.getElementById('priceText').innerText = "₹99";
            document.getElementById('vip-alert').style.display = "block";
            document.querySelector('.repair-deck').style.borderColor = "var(--core)";
        }

        function openUPI() {
            const upiUrl = `upi://pay?pa=${upiID}&pn=ResumePi_lot&am=${amt}&cu=INR`;
            window.location.href = upiUrl;
            setTimeout(() => { alert("Uplink initiated. If UPI app didn't open, please scan the QR manually."); }, 1000);
        }
    </script>
</body>
</html>
