<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot Registration | ResumePi_lot™</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --core: #00f2ff; --brand: #FF4D00; --bg: #000105; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }
        
        .hero-bg { position: fixed; inset: 0; background: radial-gradient(circle at center, #0a1321 0%, #000 100%); z-index: -1; }
        .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,242,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.05) 1px, transparent 1px); background-size: 60px 60px; z-index: -1; }
        
        /* LOGO STYLING MATCHED TO DASHBOARD */
        .top-nav { display: flex; justify-content: center; padding: 40px 0; align-items: center; }
        .logo-wrap { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .wings-logo { position: relative; width: 40px; height: 30px; display: flex; align-items: center; justify-content: center; }
        .wing { position: absolute; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 25px solid var(--core); filter: drop-shadow(0 0 5px var(--core)); }
        .wing.l { transform: rotate(-45deg) translateX(-8px); opacity: 0.6; }
        .wing.r { transform: rotate(45deg) translateX(8px); }
        .logo-text { font-family: 'Orbitron'; font-weight: 900; font-size: 18px; letter-spacing: 3px; color: white; }

        .onboarding-deck { width: 450px; margin: auto; padding: 50px; background: rgba(0, 5, 12, 0.9); border: 1px solid var(--core); border-radius: 40px; box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); text-align: center; position: relative; }
        h1 { font-family: 'Orbitron'; font-size: 20px; letter-spacing: 4px; margin-bottom: 30px; color: white; text-transform: uppercase; }
        
        .input-box { width: 100%; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 12px; color: white; font-family: 'Rajdhani'; font-size: 16px; margin-bottom: 20px; outline: none; box-sizing: border-box; transition: 0.3s; }
        .input-box:focus { border-color: var(--core); background: rgba(0, 242, 255, 0.05); }
        
        .btn-jump { width: 100%; padding: 20px; background: transparent; border: 1px solid var(--brand); color: var(--brand); font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 12px; transition: 0.3s; letter-spacing: 2px; text-transform: uppercase; }
        .btn-jump:hover { background: var(--brand); color: white; box-shadow: 0 0 30px rgba(255, 77, 0, 0.4); }
        #sub-msg { font-size: 11px; opacity: 0.5; margin-top: 15px; font-family: 'Orbitron'; letter-spacing: 1px; color: var(--core); }
    </style>
</head>
<body>
    <div class="hero-bg"><div class="grid"></div></div>
    
    <nav class="top-nav">
        <div class="logo-wrap">
            <div class="wings-logo"><div class="wing l"></div><div class="wing r"></div></div>
            <div class="logo-text">RESUMEPI_LOT™</div>
        </div>
    </nav>

    <div class="onboarding-deck">
        <h1>PILOT_REGISTRATION</h1>
        <p style="font-size: 14px; opacity: 0.7; margin-bottom: 30px;">Initialize your tactical uplink to Ground Control.</p>
        
        <input type="text" id="userName" class="input-box" placeholder="PILOT_NAME" required>
        <input type="email" id="userEmail" class="input-box" placeholder="UPLINK_EMAIL" required>
        
        <button id="regBtn" class="btn-jump" onclick="beginHyperspace()">INITIALIZE JUMP</button>
        <p id="sub-msg">AWAITING INPUT...</p>
    </div>

    <script>
        async function beginHyperspace() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            const btn = document.getElementById('regBtn');
            const msg = document.getElementById('sub-msg');
            
            if(!name || !email) { alert("Pilot credentials required."); return; }

            // Store for dashboard and gatekeeper usage
            localStorage.setItem('pilot_name', name);
            localStorage.setItem('pilot_email', email);

            btn.style.opacity = "0.5";
            btn.innerText = "INTERROGATING...";
            msg.innerText = "CHECKING PILOT CLEARANCE...";

            // n8n Verification Webhook URL (Matches your Dashboard logic)
            const VERIFY_URL = "https://alliancebusiness.app.n8n.cloud/webhook/verify-pilot";
            
            try {
                const response = await fetch(VERIFY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                
                const result = await response.json();

                if (result.status === "PAID") {
                    btn.innerText = "ACCESS GRANTED";
                    msg.innerText = "SYNC COMPLETE. JUMPING...";
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else if (result.status === "PENDING") {
                    btn.innerText = "UPLINK PENDING";
                    alert("FLIGHT PLAN PENDING: Your payment is being verified by Ground Control. Please wait 5-10 minutes.");
                    window.location.href = 'payment.html';
                } else {
                    // New user or status not found in sheet
                    window.location.href = 'payment.html';
                }
            } catch (e) {
                console.error("Uplink Error", e);
                // Fallback to payment page if server connection is lost
                window.location.href = 'payment.html';
            }
        }
    </script>
</body>
</html>
