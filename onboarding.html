<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot Induction | ResumePi_lot™</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --core: #00f2ff; --bg: #000105; --brand: #FF4D00; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .bg-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, #111b27 0%, #000 100%); z-index: -1; }
        .container { width: 400px; padding: 50px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 40px; text-align: center; backdrop-filter: blur(20px); }
        h1 { font-family: 'Orbitron'; font-size: 20px; letter-spacing: 4px; color: var(--core); margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 25px; }
        label { font-family: 'Orbitron'; font-size: 10px; color: #8fa3ad; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,242,255,0.2); padding: 15px; border-radius: 12px; color: white; font-family: 'Rajdhani'; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--core); }
        .btn-jump { background: var(--core); color: black; border: none; padding: 20px; width: 100%; font-family: 'Orbitron'; font-size: 12px; font-weight: 900; letter-spacing: 3px; border-radius: 14px; cursor: pointer; transition: 0.3s; }
        .btn-jump:hover { box-shadow: 0 0 30px var(--core); transform: scale(1.02); }
        #vip-tag { display: none; color: var(--brand); font-family: 'Orbitron'; font-size: 10px; margin-top: 20px; letter-spacing: 1px; border: 1px solid var(--brand); padding: 8px; border-radius: 4px; background: rgba(255, 77, 0, 0.1); }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="container">
        <h1>PILOT_INDUCTION</h1>
        <div class="input-group">
            <label>ASSIGN_PILOT_NAME</label>
            <input type="text" id="userName" placeholder="ENTER IDENTIFIER...">
        </div>
        <div class="input-group">
            <label>SECURE_UPLINK_EMAIL</label>
            <input type="email" id="userEmail" placeholder="COMM_CHANNEL@EMAIL.COM">
        </div>
        <button class="btn-jump" onclick="beginHyperspace()">INITIALIZE JUMP</button>
        <div id="vip-tag">RESUMEAI_VIP_STATUS: ACTIVE (₹99 RATE)</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isVIP = urlParams.get('source') === 'resumeai';
        const passedName = urlParams.get('pilot');

        if (isVIP) {
            document.getElementById('vip-tag').style.display = 'block';
            if (passedName) document.getElementById('userName').value = decodeURIComponent(passedName);
        }

        function beginHyperspace() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            if(!name || !email) { alert("Credentials required for uplink."); return; }
            
            // Forward VIP status to payment page
            let target = isVIP ? `payment.html?amt=99` : `payment.html`;
            window.location.href = target;
        }
    </script>
</body>
</html>
